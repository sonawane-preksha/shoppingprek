<!DOCTYPE html>
<html lang="en">
<head><script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

  <meta charset="UTF-8">
  <title>Simple Shop</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .products {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: darkgreen;
    }

    .cart {
      position: fixed;
      right: 0;
      top: 60px;
      width: 250px;
      background: white;
      padding: 15px;
      border-left: 2px solid #ccc;
      display: none;
      height: 100%;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Shop</h1>
    <button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
  </header>

  <section class="products" id="product-list"></section>

  <div class="cart" id="cart">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <p><strong>Total: ₹<span id="total">0</span></strong></p>
  </div>

  <script>
    const products = [
      { id: 1, name: "Shoes", price: 1500 },
      { id: 2, name: "T-Shirt", price: 500 },
      { id: 3, name: "Watch", price: 2000 }
    ];

    let cart = [];

    function displayProducts() {
      const productList = document.getElementById("product-list");

      products.forEach(product => {
        const div = document.createElement("div");
        div.classList.add("product");

        div.innerHTML = `
          <h3>${product.name}</h3>
          <p>₹${product.price}</p>
          <button onclick="addToCart(${product.id})">Add to Cart</button>
        `;

        productList.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById("cart-items");
      const totalEl = document.getElementById("total");
      const countEl = document.getElementById("cart-count");

      cartItems.innerHTML = "";
      let total = 0;

      cart.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.name} - ₹${item.price}`;
        cartItems.appendChild(li);
        total += item.price;
      });

      totalEl.textContent = total;
      countEl.textContent = cart.length;
    }

    function toggleCart() {
      const cartDiv = document.getElementById("cart");
      cartDiv.style.display =
        cartDiv.style.display === "block" ? "none" : "block";
    }

    displayProducts();
  </script>

</body>
</html>
